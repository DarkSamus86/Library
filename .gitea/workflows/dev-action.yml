name: Dev deploy to Kubernetes
on:
  push:
    branches: [dev]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: |
          git config --global http.sslVerify false
          git clone https://ro8otov:${{ secrets.runner_token }}@gitea.local/darksamus/Library.git .
          git checkout ${{ github.sha }}
      - name: Build and push Docker image
        run: |
          docker build -t registry.robotov.studio/dev-library:1.0 .
          docker push registry.robotov.studio/dev-library:1.0
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/ -n dev
          kubectl rollout status deployment/dev-library -n dev
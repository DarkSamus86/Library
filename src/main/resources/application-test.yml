spring:
  # === PostgreSQL ===
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # === JPA ===
  jpa:
    hibernate:
      ddl-auto: validate  # ✅ Flyway управляет схемой
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # === Flyway ===
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false  # ✅ Удобно для разработки
    clean-disabled: false       # ✅ Разрешить clean
    baseline-on-migrate: false

    # === Redis ✅ ===

    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  # === Cache ===
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

# === Bucket4j для dev ===
bucket4j:
  cache-configuration:
    redis:
      enabled: true

  default:
    rate-limits:
      - execute-predicate:
          path: "/api/**"
        bandwidths:
          - capacity: 100  # ✅ 100 запросов в минуту
            time: 1
            unit: minutes
        refill-speed: greedy
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: postgres
    password: 123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false  # ✅ Авто-применение миграций при старте
    clean-disabled: false       # ✅ Разрешить flyway clean для дев-среды
    baseline-on-migrate: false  # ❌ Не использовать базовую версию (если начинаете с нуля)
logging:
  file:
    name: ./logs/library-app.log
jwt:
  secret: "21K0Gom7u7W0QgeGzhNGiBGnhaE5LooZIzuoWz43SEOxQW5oBvTNk5K6RVThx9pxZY31AWLGHkVU5/ZsEJDeuQ=="
  expiration: 86400000
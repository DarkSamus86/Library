spring:
  datasource:
    url: // url
    username: // username
    password: // password
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}  # пустая строка если без пароля
      database: 0
      timeout: 2000ms
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 минут по умолчанию
      cache-null-values: false
  flyway:
    enabled: true
logging:
  file:
    name: /var/log/library-app/library-app.log
jwt:
  secret: "input-your-secret"
  expiration: 86400000
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 2000ms

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

  flyway:
    enabled: true
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-library
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-library
  template:
    metadata:
      labels:
        app: dev-library
    spec:
      containers:
        - name: dev-library
          image: registry.robotov.studio/dev-library:1.0
          ports:
            - containerPort: 80